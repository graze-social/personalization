apiVersion: v1
kind: ConfigMap
metadata:
  name: graze-personalization-config
  labels:
    app: graze-personalization
data:
  # ClickHouse configuration (non-sensitive)
  clickhouse-port: "8443"
  clickhouse-database: "default"
  clickhouse-secure: "true"

  # Jetstream configuration
  jetstream-url: "wss://jetstream2.us-west.bsky.network/subscribe"

  # Like Graph configuration
  like-ttl-days: "8"
  like-batch-size: "500"
  like-batch-interval-ms: "100"

  # Algorithm Sync configuration
  algo-posts-ttl-hours: "1"
  algo-posts-limit: "20000"
  sync-rate-limit-seconds: "300"
  sync-refresh-threshold-minutes: "30"

  # Personalization defaults (treatment params for algos 479, 3654, 2300)
  default-result-ttl-seconds: "300"
  default-max-user-likes: "10000"
  default-max-sources-per-post: "1500"
  default-max-total-sources: "100000"
  default-min-co-likes: "2"
  default-min-post-likes: "2"
  default-max-likers-per-post: "1500"
  default-max-algo-checks: "15000"
  default-speed-gate-ms: "500"
---
apiVersion: v1
kind: Secret
metadata:
  name: graze-personalization-secrets
  labels:
    app: graze-personalization
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual values before deploying!
  # Consider using external secret management (e.g., Sealed Secrets, Vault)
  
  # Redis URL (with TLS)
  redis-url: "rediss://default:CHANGE_ME@your-redis-host:25061"

  # ClickHouse host and credentials
  clickhouse-host: "your-clickhouse-host.cloud"
  clickhouse-user: "default"
  clickhouse-password: "CHANGE_ME"

  # Admin API key: required for admin endpoints (feeds, special-posts, etc.).
  # Must match PERSONALIZATION_ADMIN_API_KEY used by feed-processor (Bearer token).
  # Replace with a secure value before deploying; use external secret management in production.
  admin-api-key: "CHANGE_ME"
